name: Scrape Events

on:
  schedule:
    - cron: '0 6 * * *'  # Runs every day at 6am UTC (2am Eastern)
  workflow_dispatch:       # Allows you to run it manually from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 icalendar recurring-ical-events

      - name: Run scraper
        run: python3 scraper.py

      - name: Run gmail scraper
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
        run: python3 gmail_scraper.py

      - name: Commit updated events.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add events.json business_updates.json
          git diff --staged --quiet || git commit -m "Auto-update events data"
          git push